<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Coin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

    <!-- ─── LANGUAGE SCREEN ─── -->
    <div id="language-screen" class="screen hidden">
        <div class="lang-logo">
            <div class="bird-icon">🐦</div>
            <h1 class="title-flappy">FLAPPY</h1>
            <h1 class="title-coin">COIN</h1>
        </div>
        <p class="lang-hint">Оберіть мову / Select Language</p>
        <div class="lang-buttons">
            <button onclick="selectLanguage('ua')">🇺🇦 Українська</button>
            <button onclick="selectLanguage('en')">🇺🇸 English</button>
            <button onclick="selectLanguage('ru')">🇷🇺 Русский</button>
        </div>
    </div>

    <!-- ─── MENU SCREEN ─── -->
    <div id="menu-screen" class="screen hidden">
        <canvas id="menuBg"></canvas>
        <div class="menu-overlay">
            <div class="stats-bar">
                <div class="stat-chip">
                    <span class="stat-lbl">BALANCE</span>
                    <span class="stat-val" id="ui-balance">0.0 🪙</span>
                </div>
                <div class="stat-chip">
                    <span class="stat-lbl">BEST</span>
                    <span class="stat-val" id="ui-best">0 🏆</span>
                </div>
            </div>

            <div class="menu-hero">
                <div class="hero-titles">
                    <span class="title-flappy">FLAPPY</span>
                    <span class="title-coin">COIN</span>
                </div>
                <button class="btn-play" onclick="startGame()">
                    <span>PLAY</span>
                    <span>🎮</span>
                </button>
            </div>

            <div class="menu-grid">
                <button class="menu-btn" onclick="openTab('shop')">
                    <span class="mbtn-icon">🛒</span>
                    <span class="mbtn-label">Shop</span>
                </button>
                <button class="menu-btn" onclick="openTab('gifts')">
                    <span class="mbtn-icon">🎁</span>
                    <span class="mbtn-label">Gifts</span>
                </button>
                <button class="menu-btn" onclick="openTab('invite')">
                    <span class="mbtn-icon">👥</span>
                    <span class="mbtn-label">Friends</span>
                </button>
                <button class="menu-btn btn-ads" onclick="showRewardedAd()">
                    <span class="mbtn-icon">📺</span>
                    <span class="mbtn-label">Дивись рекламу → +5 🪙</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ─── GAME SCREEN ─── -->
    <div id="game-screen" class="screen hidden">
        <canvas id="gameCanvas"></canvas>
        <div id="game-ui">
            <div id="game-score">0</div>
            <div id="game-coins">0.0 🪙</div>
        </div>

        <!-- Game Over overlay inside game screen -->
        <div id="game-over-overlay" class="hidden">
            <div class="go-card">
                <h2 class="go-title">GAME OVER</h2>
                <div class="go-stats">
                    <div class="go-stat">
                        <span>SCORE</span>
                        <b id="go-score">0</b>
                    </div>
                    <div class="go-stat go-stat-mid">
                        <span>COINS</span>
                        <b id="go-coins">0.0</b>
                    </div>
                    <div class="go-stat">
                        <span>BEST</span>
                        <b id="go-best">0</b>
                    </div>
                </div>
                <button class="btn-play go-retry" onclick="startGame()">
                    RETRY 🔄
                </button>
                <button class="btn-menu" onclick="goToMenu()">
                    MENU 🏠
                </button>
            </div>
        </div>
    </div>

    <!-- ─── MODAL ─── -->
    <div id="tab-modal" class="modal hidden">
        <div class="modal-backdrop" onclick="closeModal()"></div>
        <div class="modal-sheet">
            <div class="modal-handle"></div>
            <button class="close-btn" onclick="closeModal()">✕</button>
            <div id="tab-content"></div>
        </div>
    </div>

</div>
<script type="module" src="script.js"></script>
</body>
</html>

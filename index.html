<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Coin Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="language-screen" class="screen hidden">
            <h1>Оберіть мову / Select Language</h1>
            <div class="lang-buttons">
                <button onclick="selectLanguage('ua')">🇺🇦 Українська</button>
                <button onclick="selectLanguage('en')">🇺🇸 English</button>
                <button onclick="selectLanguage('ru')">🇷🇺 Русский</button>
            </div>
        </div>

        <div id="menu-screen" class="screen hidden">
            <div class="stats-bar">
                <span>Баланс: <b id="ui-balance">0.0</b> 🪙</span>
                <span>Рекорд: <b id="ui-best">0</b></span>
            </div>
            <div class="menu-buttons">
                <button class="btn-play" onclick="startGame()">ГРАТИ 🎮</button>
                <button onclick="openTab('shop')">Магазин 🛒</button>
                <button onclick="openTab('gifts')">Подарунки 🎁</button>
                <button onclick="openTab('invite')">Друзі 👥</button>
                <button class="btn-ads" onclick="showRewardedAd()">+5.0 МОНЕТ 📺</button>
            </div>
        </div>

        <div id="game-screen" class="screen hidden">
            <canvas id="gameCanvas"></canvas>
            <div id="game-ui">
                <span id="game-coins">0.0 🪙</span>
            </div>
        </div>

        <div id="tab-modal" class="modal hidden">
            <div class="modal-content">
                <button class="close-btn" onclick="closeModal()">×</button>
                <div id="tab-content">
                    </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
